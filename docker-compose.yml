version: '3.8'

services:
  ethusdt-trading:
    build: .
    container_name: ethusdt-quantitative-system
    ports:
      - "8501:8501"
    environment:
      - TZ=Asia/Shanghai
      # CoinEx API 配置（需要在 .env 文件中设置）
      - COINEX_ACCESS_ID=${COINEX_ACCESS_ID}
      - COINEX_SECRET_KEY=${COINEX_SECRET_KEY}
    volumes:
      # 持久化配置和数据
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama AI 服务（可选）
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai

volumes:
  ollama_data:

networks:
  default:
    name: ethusdt-network
